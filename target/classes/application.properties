
# ============================================================
# FCMS — Application Properties
# Antigravity Software | Spring Boot 3.x
# ============================================================

# JSP View Resolver
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# Server
server.port=8080
server.servlet.context-path=/

# Data Storage Path (CSV fallback / image storage)
app.data.path=./data/

# ── MySQL Database ──────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/fcms_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Colombo&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Static Resources
spring.web.resources.static-locations=classpath:/static/,file:src/main/webapp/static/

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Disable whitelabel error page
server.error.whitelabel.enabled=false

# Logging
logging.level.com.antigravity.fcms=INFO
logging.level.org.springframework.web=WARN
