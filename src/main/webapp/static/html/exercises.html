<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Exercise Library — APEX FITNESS</title>
<meta name="description" content="Browse exercises with muscle group, equipment and training style filters. APEX Fitness Exercise Library.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="/static/css/exercise-detail.css">
<style>
:root{--accent:#C8F03D;--black:#0a0a0a;--card:#111;--border:rgba(255,255,255,.07);--gray:rgba(255,255,255,.45);--font-display:'Bebas Neue',sans-serif;--font-body:'Inter',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:#fff;font-family:var(--font-body);min-height:100vh;}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 3rem;height:70px;background:rgba(10,10,10,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.nav-logo{font-family:var(--font-display);font-size:1.6rem;letter-spacing:2px;color:#fff;text-decoration:none;}
.nav-logo span{color:var(--accent);}
.nav-back{display:flex;align-items:center;gap:.5rem;color:rgba(255,255,255,.55);font-size:.82rem;font-weight:600;text-decoration:none;transition:color .2s;}
.nav-back:hover{color:var(--accent);}

/* HERO */
.ex-hero{padding:4rem 2rem 3rem;text-align:center;position:relative;overflow:hidden;}
.ex-hero::before{content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:600px;height:300px;background:radial-gradient(ellipse,rgba(200,240,61,.06) 0%,transparent 70%);pointer-events:none;}
.ex-tag{display:inline-block;font-size:.65rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--accent);border:1px solid rgba(200,240,61,.25);padding:.3rem 1rem;border-radius:50px;margin-bottom:1rem;}
.ex-hero h1{font-family:var(--font-display);font-size:clamp(2.8rem,6vw,5rem);letter-spacing:2px;line-height:1;margin-bottom:.75rem;}
.ex-hero h1 span{color:var(--accent);}
.ex-hero p{color:var(--gray);font-size:.95rem;max-width:520px;margin:0 auto;line-height:1.7;}

/* SEARCH */
.search-wrap{max-width:580px;margin:2rem auto 0;position:relative;}
.search-wrap i{position:absolute;left:1.25rem;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.3);font-size:1rem;pointer-events:none;}
.search-wrap input{width:100%;padding:.95rem 1.5rem .95rem 3.25rem;border-radius:50px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#fff;font-family:var(--font-body);font-size:.9rem;outline:none;transition:border-color .25s;}
.search-wrap input:focus{border-color:rgba(200,240,61,.5);background:rgba(200,240,61,.02);}
.search-wrap input::placeholder{color:rgba(255,255,255,.25);}

/* FILTERS */
.filters{max-width:1100px;margin:0 auto;padding:2.5rem 1.5rem 0;}
.filter-label{font-size:.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:.6rem;}
.filter-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.25rem;}
.f-btn{padding:.4rem 1rem;border-radius:50px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.5);font-size:.72rem;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:all .2s;white-space:nowrap;}
.f-btn.cat{font-size:.75rem;padding:.5rem 1.2rem;}
.f-btn.cat.active,.f-btn.cat:hover{border-color:var(--accent);color:var(--accent);background:rgba(200,240,61,.07);}
.f-btn.muscle.active,.f-btn.muscle:hover{border-color:rgba(200,240,61,.35);color:var(--accent);background:rgba(200,240,61,.05);}
.f-btn.equip.active,.f-btn.equip:hover{border-color:rgba(96,165,250,.35);color:#60a5fa;background:rgba(96,165,250,.05);}
.f-divider{height:1px;background:var(--border);margin:1rem 0;}

/* STATS BAR */
.stats-bar{display:flex;align-items:center;justify-content:space-between;max-width:1100px;margin:0 auto;padding:.75rem 1.5rem;font-size:.75rem;color:var(--gray);}
.stats-bar span b{color:#fff;font-weight:700;}

/* GRID */
.ex-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:1.5rem;max-width:1100px;margin:0 auto;padding:0 1.5rem 4rem;}
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:0;transition:all .3s;cursor:pointer;position:relative;overflow:hidden;animation:cardIn .35s ease both;display:flex;flex-direction:column;}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.ex-card:hover{transform:translateY(-4px);border-color:rgba(200,240,61,.22);box-shadow:0 14px 36px rgba(0,0,0,.4);}
.ex-card::before{content:'';position:absolute;top:0;left:-100%;width:55%;height:100%;background:linear-gradient(90deg,transparent,rgba(200,240,61,.03),transparent);transition:left .55s;z-index:2;pointer-events:none;}
.ex-card:hover::before{left:150%;}
.ex-img-wrap{width:100%;height:190px;position:relative;overflow:hidden;border-radius:16px 16px 0 0;flex-shrink:0;background:linear-gradient(135deg,#0b1c10,#0e2416);}
.ex-img-wrap img{width:100%;height:100%;object-fit:cover;object-position:center;transition:transform .5s ease;display:block;}
.ex-card:hover .ex-img-wrap img{transform:scale(1.06);}
.ex-img-overlay{position:absolute;inset:0;background:linear-gradient(to top,var(--card) 0%,rgba(10,10,10,.25) 55%,transparent 100%);pointer-events:none;z-index:1;}
.ex-no-img{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.55rem;background:linear-gradient(135deg,#0b1c10,#0e2416),repeating-linear-gradient(0deg,transparent,transparent 22px,rgba(255,255,255,.018) 22px,rgba(255,255,255,.018) 23px),repeating-linear-gradient(90deg,transparent,transparent 22px,rgba(255,255,255,.018) 22px,rgba(255,255,255,.018) 23px);}
.ex-no-img i{font-size:2rem;color:rgba(255,255,255,.1);}
.ex-no-img span{font-size:.55rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.08);}
.ex-content{padding:1.25rem 1.4rem 1.6rem;display:flex;flex-direction:column;flex-grow:1;}
.ex-name{font-weight:700;font-size:1.05rem;color:#fff;margin-bottom:.4rem;line-height:1.3;}
.ex-desc{font-size:.75rem;color:rgba(255,255,255,.5);line-height:1.55;margin-bottom:1.1rem;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;flex-grow:1;}
.ex-tags{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:auto;}
.ex-tag{padding:.12rem .45rem;border-radius:4px;font-size:.58rem;font-weight:700;letter-spacing:.4px;}
.ex-tag.m{background:rgba(200,240,61,.1);color:var(--accent);}
.ex-tag.e{background:rgba(96,165,250,.1);color:#60a5fa;}
.ex-tag.s{background:rgba(167,139,250,.1);color:#a78bfa;}

/* EMPTY STATE */
.empty-state{text-align:center;padding:5rem 2rem;color:var(--gray);grid-column:1/-1;}
.empty-state i{font-size:3rem;display:block;margin-bottom:1rem;color:rgba(255,255,255,.1);}

/* LOAD MORE */
.load-more-wrap{text-align:center;padding:0 0 4rem;}
.btn-load{padding:.8rem 2.5rem;border-radius:50px;border:1px solid rgba(200,240,61,.35);background:rgba(200,240,61,.06);color:var(--accent);font-family:var(--font-body);font-size:.82rem;font-weight:700;cursor:pointer;transition:all .25s;letter-spacing:.5px;}
.btn-load:hover{background:var(--accent);color:#000;}

@media(max-width:700px){.nav{padding:0 1.25rem;}.filters,.ex-grid,.stats-bar{padding-left:1rem;padding-right:1rem;}.ex-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a href="/" class="nav-logo">APEX<span>FITNESS</span></a>
  <a href="/" class="nav-back"><i class="bi bi-arrow-left"></i> Back to Home</a>
</nav>

<!-- HERO -->
<div class="ex-hero">

  <h1>EXERCISE <span>LIBRARY</span></h1>
  <p>Browse our complete library with muscle group, equipment and training style filters. Your reference for every movement.</p>
  <div class="search-wrap">
    <i class="bi bi-search"></i>
    <input id="exSearch" type="text" placeholder="Search e.g. Deadlift, Plank, Hip Thrust..." oninput="render()">
  </div>
</div>

<!-- FILTERS -->
<div class="filters">
  <div class="filter-label">Category</div>
  <div class="filter-row" id="catRow">
    <button class="f-btn cat active" onclick="setCat('all',this)">All</button>
    <button class="f-btn cat" onclick="setCat('build',this)"><i class="bi bi-hammer"></i> Build</button>
    <button class="f-btn cat" onclick="setCat('focus',this)"><i class="bi bi-crosshair"></i> Focus</button>
    <button class="f-btn cat" onclick="setCat('goals',this)"><i class="bi bi-flag-fill"></i> Goals</button>
  </div>
  <div class="filter-label">Muscle Group</div>
  <div class="filter-row" id="muscleRow">
    <button class="f-btn muscle active" onclick="setMuscle('all',this)">All Muscles</button>
    <button class="f-btn muscle" onclick="setMuscle('abs',this)">Abs / Core</button>
    <button class="f-btn muscle" onclick="setMuscle('arms',this)">Arms</button>
    <button class="f-btn muscle" onclick="setMuscle('back',this)">Back</button>
    <button class="f-btn muscle" onclick="setMuscle('chest',this)">Chest</button>
    <button class="f-btn muscle" onclick="setMuscle('glutes',this)">Glutes</button>
    <button class="f-btn muscle" onclick="setMuscle('legs',this)">Legs</button>
    <button class="f-btn muscle" onclick="setMuscle('shoulders',this)">Shoulders</button>
  </div>
  <div class="filter-label">Equipment</div>
  <div class="filter-row" id="equipRow">
    <button class="f-btn equip active" onclick="setEquip('all',this)">All Equipment</button>
    <button class="f-btn equip" onclick="setEquip('barbell',this)">Barbell</button>
    <button class="f-btn equip" onclick="setEquip('dumbbell',this)">Dumbbell</button>
    <button class="f-btn equip" onclick="setEquip('bodyweight',this)">Bodyweight</button>
    <button class="f-btn equip" onclick="setEquip('cable',this)">Cable</button>
    <button class="f-btn equip" onclick="setEquip('machine',this)">Machine</button>
    <button class="f-btn equip" onclick="setEquip('kettlebell',this)">Kettlebell</button>
    <button class="f-btn equip" onclick="setEquip('band',this)">Resistance Band</button>
    <button class="f-btn equip" onclick="setEquip('stability',this)">Stability Ball</button>
  </div>
  <div class="f-divider"></div>
</div>

<!-- STATS BAR -->
<div class="stats-bar">
  <span id="exCount">Loading exercises…</span>
  <span style="font-size:.65rem;letter-spacing:1px;text-transform:uppercase;">APEX FITNESS · EXERCISE LIBRARY</span>
</div>

<!-- GRID -->
<div class="ex-grid" id="exGrid"></div>

<!-- LOAD MORE -->
<div class="load-more-wrap" id="loadMoreWrap" style="display:none;">
  <button class="btn-load" onclick="loadMore()">Load More <i class="bi bi-arrow-down"></i></button>
</div>

<script>
var DATA = [];

let catF='all', muscleF='all', equipF='all', searchF='', page=1, pageSize=12;

// Load exercises from API
fetch('/api/exercises')
  .then(function(r) {
    if (!r.ok) { throw new Error('API returned ' + r.status); }
    var ct = r.headers.get('Content-Type') || '';
    if (!ct.includes('application/json')) { throw new Error('API returned non-JSON'); }
    return r.json();
  })
  .then(function(data) {
    DATA = data;
    loadServerImages(drawGrid);
  })
  .catch(function() {
    document.getElementById('exGrid').innerHTML='<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>Could not load exercises.<br>Please try again later.</p></div>';
  });

function filtered(){
  const q=searchF.toLowerCase();
  return DATA.filter(e=>{
    if(catF!=='all'&&e.c!==catF) return false;
    if(muscleF!=='all'&&e.m!==muscleF) return false;
    if(equipF!=='all'&&e.e!==equipF) return false;
    if(q&&!e.name.toLowerCase().includes(q)&&!e.desc.toLowerCase().includes(q)&&!e.s.join(' ').toLowerCase().includes(q)) return false;
    return true;
  });
}

function render(){
  searchF=document.getElementById('exSearch').value.trim();
  page=1;
  drawGrid();
}

// Fetch server-side image list
var serverImageIds={};
function loadServerImages(cb){
  fetch('/api/exercise-images/list').then(function(r){return r.json();}).then(function(ids){
    serverImageIds={};
    ids.forEach(function(id){serverImageIds[id]=true;});
    if(cb)cb();
  }).catch(function(){if(cb)cb();});
}
function exImgUrl(id){return'/api/exercise-images?id='+encodeURIComponent(id);}

function drawGrid(){
  const list=filtered();
  const vis=list.slice(0,page*pageSize);
  const grid=document.getElementById('exGrid');
  document.getElementById('exCount').innerHTML=`Showing <b>${vis.length}</b> of <b>${list.length}</b> exercises`;
  document.getElementById('loadMoreWrap').style.display=vis.length<list.length?'':'none';
  if(vis.length===0){
    grid.innerHTML='<div class="empty-state"><i class="bi bi-search"></i><p>No exercises found.<br>Try adjusting your filters.</p></div>';
    return;
  }
  grid.innerHTML=vis.map((e,i)=>{
    const slugId = e.slugId || e.id;
    const hasServerImg=!!serverImageIds[slugId];
    const customImg=!hasServerImg&&slugId?localStorage.getItem('eximg_'+slugId):null;
    const imgSrc=hasServerImg?exImgUrl(slugId):(customImg||null);
    const imgBlock=imgSrc
      ?`<div class="ex-img-wrap"><img src="${imgSrc}" alt="${e.name}" loading="lazy"><div class="ex-img-overlay"></div></div>`
      :`<div class="ex-img-wrap"><div class="ex-no-img"><i class="bi bi-camera"></i><span>Image Pending</span></div></div>`;
    return `<div class="ex-card" style="animation-delay:${(i%pageSize)*0.04}s" onclick="openExDetail('${slugId}')">
      ${imgBlock}
      <div class="ex-content">
        <div class="ex-name">${e.name}</div>
        <div class="ex-desc">${e.desc}</div>
        <div class="ex-tags">
          <span class="ex-tag m">${e.m.charAt(0).toUpperCase()+e.m.slice(1)}</span>
          <span class="ex-tag e">${e.e.charAt(0).toUpperCase()+e.e.slice(1)}</span>
          ${e.s.slice(0,2).map(t=>`<span class="ex-tag s">${t}</span>`).join('')}
        </div>
      </div>
    </div>`;
  }).join('');
}

function setCat(v,btn){catF=v;setActive('#catRow',btn);page=1;drawGrid();}
function setMuscle(v,btn){muscleF=v;setActive('#muscleRow',btn);page=1;drawGrid();}
function setEquip(v,btn){equipF=v;setActive('#equipRow',btn);page=1;drawGrid();}
function setActive(row,btn){document.querySelectorAll(row+' .f-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function loadMore(){page++;drawGrid();}
</script>
<script src="/static/js/exercise-detail.js?v=2"></script>
</body>
</html>
