<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Attendance Check-In — APEX FITNESS</title>
<meta name="description" content="Record daily member check-ins and view attendance history for APEX Fitness.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="../css/booking.css">
</head>
<body style="background:var(--bg);color:var(--text);font-family:var(--font-body);">

<!-- NAV -->
<nav style="display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:60px;background:rgba(10,10,10,.95);border-bottom:1px solid var(--border);">
  <a href="/" style="font-family:var(--font-display);font-size:1.4rem;letter-spacing:2px;color:#fff;text-decoration:none;">APEX<span style="color:var(--accent);">FITNESS</span></a>
  <div style="display:flex;gap:1rem;align-items:center;">
    <a href="/" style="color:var(--text-muted);font-size:.82rem;text-decoration:none;"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="/members" style="color:var(--text-muted);font-size:.82rem;text-decoration:none;"><i class="bi bi-people-fill"></i> Members</a>
  </div>
</nav>

<main style="max-width:1100px;margin:0 auto;padding:2rem 1.5rem;">

  <!-- Banner -->
  <div style="background:linear-gradient(135deg,#0d1a12,#111);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;margin-bottom:2rem;position:relative;overflow:hidden;">
    <div style="position:relative;z-index:1;">
      <h1 style="font-family:var(--font-display);font-size:2rem;letter-spacing:2px;margin-bottom:.3rem;">
        <i class="bi bi-clock-history" style="margin-right:.5rem;"></i>ATTENDANCE CHECK-IN
      </h1>
      <p style="color:var(--text-muted);font-size:.85rem;">Record member attendance and gym check-ins</p>
    </div>
  </div>

  <div class="row g-3">
    <!-- Check-In Form -->
    <div class="col-lg-5">
      <div class="checkin-card">
        <h4 style="margin-bottom:1rem;font-size:1.1rem;">
          <i class="bi bi-person-check-fill" style="margin-right:.5rem;"></i>Record Check-In
        </h4>
        <form method="post" action="/attendance/checkin">
          <div style="margin-bottom:1rem;">
            <label style="color:rgba(255,255,255,.8);font-size:.82rem;display:block;margin-bottom:.4rem;">Member ID</label>
            <div style="display:flex;gap:.75rem;">
              <input type="text" id="memberIdInput" name="memberId" placeholder="e.g. M001" required
                style="flex:1;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.3);border-radius:10px;color:#fff;padding:.6rem .75rem;font-family:var(--font-body);outline:none;">
              <button type="submit" style="background:var(--accent);color:#000;border:none;border-radius:10px;padding:.6rem 1rem;font-weight:700;cursor:pointer;white-space:nowrap;">
                <i class="bi bi-box-arrow-in-right"></i> Check In
              </button>
            </div>
            <small id="memberNameDisplay" style="color:rgba(255,255,255,.6);font-size:.78rem;margin-top:.4rem;display:block;"></small>
          </div>
        </form>
        <div style="margin-top:1.5rem;padding-top:1rem;border-top:1px solid rgba(255,255,255,.15);">
          <div class="live-clock">
            <i class="bi bi-clock-fill"></i>
            <span class="live-clock-time">--:--:-- AM</span>
          </div>
          <div style="margin-top:.75rem;">
            <div style="font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);">Check-Ins Today</div>
            <div class="booking-stat-val" data-count="0">0</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Attendance List -->
    <div class="col-lg-7">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:1rem 1.25rem;border-bottom:1px solid var(--border);">
          <h5 style="margin:0;font-size:.95rem;"><i class="bi bi-list-check" style="margin-right:.5rem;"></i>Today's Attendance</h5>
          <span style="color:var(--text-muted);font-size:.82rem;">0 records</span>
        </div>
        <div style="text-align:center;padding:3rem;color:var(--text-muted);">
          <i class="bi bi-calendar-x" style="font-size:2.5rem;display:block;margin-bottom:.75rem;"></i>
          No check-ins recorded yet.
        </div>
      </div>
    </div>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/booking.js"></script>
</body>
</html>
